<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Explorador de archivos</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="toolbar">
  <button type="button" class="tb-btn" data-action="new-folder"><span class="tb-icon" data-icon="folder"></span>Nuevo</button>
  <span class="tb-sep"></span>
  <button type="button" class="tb-btn" data-action="cut"><span class="tb-icon" data-icon="scissors"></span>Cortar</button>
  <button type="button" class="tb-btn" data-action="copy"><span class="tb-icon" data-icon="copy"></span>Copiar</button>
  <button type="button" class="tb-btn" data-action="paste"><span class="tb-icon" data-icon="clipboard"></span>Pegar</button>
  <button type="button" class="tb-btn" data-action="rename"><span class="tb-icon" data-icon="edit"></span>Renombrar</button>
  <button type="button" class="tb-btn" data-action="delete"><span class="tb-icon" data-icon="trash"></span>Eliminar</button>
  <span class="tb-sep"></span>
  <button type="button" class="tb-btn" data-action="sort"><span class="tb-icon" data-icon="arrow-up-down"></span>Ordenar</button>
  <button type="button" class="tb-btn" data-action="view"><span class="tb-icon" id="viewIcon" data-icon="layout-grid"></span>Ver</button>
</div>

<div class="addressbar">
  <div class="nav-arrows">
    <button type="button" class="nav-btn" id="backButton" title="Atrás"><span data-icon="arrow-left"></span></button>
    <button type="button" class="nav-btn" id="upButton" title="Subir"><span data-icon="arrow-up"></span></button>
  </div>
  <div class="crumbs" id="crumbs"></div>
  <div class="search-box">
    <span class="tb-icon" data-icon="search"></span>
    <input type="text" id="searchInput" placeholder="Buscar en esta carpeta">
  </div>
</div>

<div class="layout">
  <nav class="sidebar">
    <p class="sidebar-title">Acceso rápido</p>
    <div id="quickAccess"></div>
    <p class="sidebar-title">Este equipo</p>
    <div class="sidebar-item" id="storageEntry"><span class="si-icon" data-icon="hard-drive"></span><span>Almacenamiento</span></div>
    <div class="storage-mini" id="storageMini"></div>
  </nav>

  <main class="content">
    <p class="section-title" id="sectionTitle">Inicio</p>
    <div class="grid" id="grid"></div>
    <div class="list-view" id="listView" hidden></div>
  </main>
</div>

<footer class="statusbar">
  <span id="itemCount">0 elementos</span>
  <span id="clipboardStatus"></span>
</footer>
<script src="/icons.js"></script>
<script src="script.js"></script>
</body>
</html>
