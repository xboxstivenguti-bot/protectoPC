<style>

.winbar{height:32px;background:linear-gradient(180deg,#171e31,#101626);display:flex;align-items:center;gap:7px;padding:0 5px 0 8px;border-bottom:1px solid #ffffff10;cursor:move;user-select:none;touch-action:none}.winicon{width:19px;height:19px;border-radius:5px;display:grid;place-items:center;overflow:hidden;background:#ffffff0d;flex:0 0 auto}.winicon img{width:100%;height:100%;object-fit:contain}.wintitle{font-size:10px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.wincontrols{display:flex;gap:3px;position:relative;z-index:4}.wincontrols button{width:27px;height:25px;border:0;border-radius:6px;background:#ffffff08;font-size:11px;touch-action:manipulation}.wincontrols button:active{background:#ffffff1a}.wincontrols .close:active{background:#d84a58}
.winbody{height:calc(100% - 32px);position:relative;background:#02050b}.winframe{width:100%;height:100%;border:0;background:#02050b;touch-action:auto}.touch-bridge{position:absolute;inset:0;z-index:6;pointer-events:none;touch-action:none;background:transparent}.touch-bridge.dragging{cursor:grabbing}.resize-handle{position:absolute;right:0;bottom:0;width:23px;height:23px;cursor:nwse-resize;touch-action:none;z-index:9}.resize-handle:after{content:'';position:absolute;right:4px;bottom:4px;width:9px;height:9px;border-right:2px solid #ffffff48;border-bottom:2px solid #ffffff48}

.task{position:absolute;left:0;right:0;bottom:0;height:48px;background:#050a19ef;border-top:1px solid var(--line);display:flex;align-items:center;gap:6px;padding:6px 9px;z-index:90}.start{width:36px;height:36px;border:0;border-radius:10px;background:linear-gradient(145deg,var(--a),var(--b));display:grid;grid-template-columns:repeat(2,7px);grid-template-rows:repeat(2,7px);gap:3px;place-content:center;flex:0 0 auto}.start i{display:block;background:#fff;border-radius:1px}.task-apps{display:flex;gap:5px;min-width:0;overflow:auto;flex:1}.task-app{height:34px;min-width:34px;max-width:108px;border:1px solid #ffffff0b;border-radius:9px;background:#ffffff06;padding:0 8px;display:flex;align-items:center;gap:5px;font-size:9px;white-space:nowrap;overflow:hidden;touch-action:manipulation}.task-app.active{background:#526bc144;border-color:#758cff88}.task-app img{width:19px;height:19px;object-fit:contain;flex:0 0 auto}.task-app span{overflow:hidden;text-overflow:ellipsis}.clock{text-align:right;font-size:9px;flex:0 0 auto}
.start-menu{position:absolute;left:8px;bottom:54px;width:min(330px,calc(100% - 16px));padding:11px;border:1px solid var(--line);border-radius:17px;background:rgba(7,11,25,.98);box-shadow:0 24px 60px #000b;display:none;z-index:105}.start-menu.open{display:block}.start-head{display:flex;align-items:center;justify-content:space-between;padding:2px 3px 10px}.start-head strong{font-size:13px}.start-head small{font-size:9px;color:var(--muted)}.start-apps{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.start-app{border:1px solid #ffffff0b;border-radius:12px;background:#ffffff06;padding:8px 4px;display:grid;place-items:center;gap:5px;font-size:9px;touch-action:manipulation}.start-app img{width:34px;height:34px;object-fit:contain}.start-actions{display:flex;gap:7px;margin-top:9px}.start-actions button{flex:1;border:1px solid #ffffff10;border-radius:10px;background:#ffffff06;padding:8px;font-size:9px;touch-action:manipulation}
.virtual-cursor{position:absolute;left:40px;top:40px;width:17px;height:22px;pointer-events:none;z-index:125;opacity:0;transform:translate3d(-2px,-2px,0);transition:opacity .1s}.virtual-cursor.visible{opacity:1}.virtual-cursor svg{width:100%;height:100%;filter:drop-shadow(0 1px 1px #000)}
.hinge{height:19px;width:92%;margin:auto;border-radius:0 0 17px 17px;background:linear-gradient(#202630,#080b10)}.base{height:410px;border-radius:11px 11px 35px 35px;background:linear-gradient(145deg,#1b2029,#0e121a 65%,#202630);padding:25px 38px;position:relative}.keyboard{display:grid;gap:5px}.keyboard-row{display:flex;gap:5px;width:100%}.key{height:27px;min-width:0;flex:var(--w,1) 1 0;border:1px solid #ffffff06;border-radius:6px;background:linear-gradient(#121823,#060910);box-shadow:inset 0 1px #ffffff12;color:#7f8ba3;display:grid;place-items:center;padding:0 3px;font-size:8px;line-height:1;user-select:none;touch-action:manipulation;white-space:nowrap}.key:active,.key.active{transform:translateY(1px);background:linear-gradient(#1c2638,#0a0e17);color:#eef3ff;border-color:#4d8cff55}.trackpad{width:245px;height:84px;border:1px solid #394151;border-radius:15px;margin:19px auto 0;background:linear-gradient(145deg,#0a0e16,#0d121d);position:relative;touch-action:none;overflow:hidden}.trackpad:before{content:'TOUCHPAD';position:absolute;inset:0;display:grid;place-items:center;color:#536077;font-size:9px;letter-spacing:3px}.trackpad:after{content:'';position:absolute;right:9px;top:10px;bottom:10px;width:4px;border-radius:999px;background:linear-gradient(#ffffff08,#4f78cf66,#ffffff08)}.trackpad.active{border-color:#4d8cff;box-shadow:0 0 0 1px #4d8cff55}.trackpad.scroll:before{content:'SCROLL'}.track-buttons{width:245px;margin:4px auto 0;display:grid;grid-template-columns:1fr 1fr;gap:5px}.track-buttons button{height:22px;border:1px solid #ffffff08;border-radius:0 0 10px 10px;background:#090d15;color:#536077;font-size:8px;touch-action:manipulation}.status{position:absolute;right:46px;bottom:24px;width:8px;height:8px;border-radius:50%;background:#53ef9b;box-shadow:0 0 15px #53ef9b}.native-input{position:fixed;left:-1000px;top:-1000px;width:1px;height:1px;opacity:0}.center-button{position:fixed;right:max(12px,env(safe-area-inset-right));bottom:max(14px,env(safe-area-inset-bottom));z-index:140;width:48px;height:48px;border:1px solid #ffffff1c;border-radius:50%;background:#11182dea;box-shadow:0 15px 35px #0009;color:#dce6ff;font-size:21px;display:grid;place-items:center;touch-action:manipulation}
@media(pointer:coarse){.touch-bridge{pointer-events:auto}}
@media(max-width:760px){.scene{padding:7px 2px 90px}.laptop{width:calc(100vw - 4px)}.display{width:96%;padding:9px 9px 15px}.base{height:405px;padding:22px 18px}.icons{grid-template-columns:repeat(4,65px);gap:10px}.tile{width:43px;height:43px}.key{height:26px;font-size:7.1px}.trackpad,.track-buttons{width:235px}.trackpad{height:80px;margin-top:17px}.os-window{min-width:188px}.task-app{max-width:76px;padding:0 6px}}
</style>

<body>
<main class="scene" id="scene"><section class="laptop" id="laptop"><div class="display"><span class="camera"></span><div class="screen" id="screen">
<section class="power" id="power"><h1>ANDER</h1><button id="powerBtn">⏻</button><span>Presiona para encender Linux</span></section>
<section class="desktop" id="desktop"><div class="icons" id="desktopIcons"></div></section>
<div class="window-layer" id="windowLayer"></div>
<div class="snap-assist" id="snapAssist"><div class="snap-zone" data-snap-zone="left">Mitad izquierda</div><div class="snap-zone" data-snap-zone="max">Completa</div><div class="snap-zone" data-snap-zone="right">Mitad derecha</div></div><div class="snap-preview" id="snapPreview"></div>
<aside class="start-menu" id="startMenu"><div class="start-head"><strong>ANDER</strong><small>Aplicaciones</small></div><div class="start-apps" id="startApps"></div><div class="start-actions"><button id="menuCascade">Cascada</button><button id="menuCenter">Centrar</button><button id="menuPower">Apagar</button></div></aside>
<nav class="task"><button class="start" id="startButton" aria-label="Aplicaciones"><i></i><i></i><i></i><i></i></button><div class="task-apps" id="taskApps"></div><div class="clock" id="clock"></div></nav>
<span class="virtual-cursor" id="cursor"><svg viewBox="0 0 20 26" aria-hidden="true"><path d="M2 1v20l5-5 4 8 4-2-4-8h7L2 1Z" fill="#fff" stroke="#111" stroke-width="1.4"/></svg></span>
</div></div><div class="hinge"></div><div class="base"><div class="keyboard" id="keyboard"></div><div class="trackpad" id="trackpad"></div><div class="track-buttons"><button id="leftClick">CLIC</button><button id="rightClick">DERECHO</button></div><span class="status"></span></div></section></main>
<button class="center-button" id="centerButton" aria-label="Centrar computadora">◎</button>
<textarea class="native-input" id="nativeInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
<script>
const routes={
 linux:{title:'ANDER Linux',url:'/linux/',icon:'/icons/linux.svg'},
 browser:{title:'Chromium',url:'/browser/',icon:'/icons/chromium.svg'},
 code:{title:'Visual Studio Code',url:'/code/',icon:'/icons/vscode.svg'},
 powershell:{title:'PowerShell 7',url:'/powershell/',icon:'/icons/powershell.svg'},
 files:{title:'Archivos Linux',url:'/files/',icon:'/icons/files.svg'},
 settings:{title:'Configuración',url:'/settings/',icon:'/icons/settings.svg'}
};
const scene=document.querySelector('#scene'),screen=document.querySelector('#screen'),power=document.querySelector('#power'),desktopIcons=document.querySelector('#desktopIcons'),windowLayer=document.querySelector('#windowLayer'),taskApps=document.querySelector('#taskApps'),startApps=document.querySelector('#startApps'),startMenu=document.querySelector('#startMenu'),snapAssist=document.querySelector('#snapAssist'),snapPreview=document.querySelector('#snapPreview'),cursor=document.querySelector('#cursor'),trackpad=document.querySelector('#trackpad'),keyboard=document.querySelector('#keyboard'),nativeInput=document.querySelector('#nativeInput');
let windows=new Map(),activeId=null,zCounter=30,spawnOffset=0,dragState=null,resizeState=null,snapChoice=null;
let cursorX=80,cursorY=70,padPointer=null,padLast=null,padMoved=0,padScroll=false,lastTap=0,caps=false,shift=false,ctrl=false,alt=false,meta=false;
const appOrder=['linux','browser','code','powershell','files','settings'];
function appMarkup(id,menu=false){const r=routes[id];return menu?`<button class="start-app" data-menu-app="${id}"><img src="${r.icon}" alt=""><span>${r.title}</span></button>`:`<button class="icon" data-app="${id}"><span class="tile"><img class="app-logo" src="${r.icon}" alt=""></span><span>${r.title}</span></button>`}
desktopIcons.innerHTML=appOrder.map(id=>appMarkup(id)).join('');startApps.innerHTML=appOrder.map(id=>appMarkup(id,true)).join('');
function bindTap(el,fn){let touchAt=0;el.addEventListener('pointerup',e=>{if(e.pointerType==='touch'||e.pointerType==='pen'){touchAt=Date.now();e.preventDefault();e.stopPropagation();fn(e)}});el.addEventListener('click',e=>{if(Date.now()-touchAt<500)return;e.preventDefault();e.stopPropagation();fn(e)})}
function bindTapDelegate(root,selector,fn){let touchAt=0;root.addEventListener('pointerup',e=>{const t=e.target.closest(selector);if(!t||!root.contains(t)||!(e.pointerType==='touch'||e.pointerType==='pen'))return;touchAt=Date.now();e.preventDefault();e.stopPropagation();fn(t,e)});root.addEventListener('click',e=>{const t=e.target.closest(selector);if(!t||!root.contains(t)||Date.now()-touchAt<500)return;e.preventDefault();e.stopPropagation();fn(t,e)})}
function centerLaptop(behavior='smooth'){requestAnimationFrame(()=>scene.scrollTo({left:Math.max(0,(scene.scrollWidth-scene.clientWidth)/2),top:0,behavior}))}
function usableRect(){return{w:screen.clientWidth,h:Math.max(120,screen.clientHeight-48)}}
function boot(){power.style.display='none';localStorage.setItem('ander-linux-on','1');centerLaptop('auto')}
function powerOff(){for(const id of [...windows.keys()])closeWindow(id);startMenu.classList.remove('open');power.style.display='grid';localStorage.removeItem('ander-linux-on');centerLaptop()}
function rectOf(win){return{x:parseFloat(win.style.left)||0,y:parseFloat(win.style.top)||0,w:parseFloat(win.style.width)||win.offsetWidth,h:parseFloat(win.style.height)||win.offsetHeight}}
function applyRect(win,r){const u=usableRect(),w=Math.max(188,Math.min(r.w,u.w)),h=Math.max(120,Math.min(r.h,u.h));win.style.left=Math.max(0,Math.min(r.x,u.w-w))+'px';win.style.top=Math.max(0,Math.min(r.y,u.h-h))+'px';win.style.width=w+'px';win.style.height=h+'px'}
function focusWindow(id){const rec=windows.get(id);if(!rec)return;activeId=id;rec.el.classList.remove('minimized');rec.minimized=false;rec.el.style.zIndex=++zCounter;document.querySelectorAll('.os-window').forEach(w=>w.classList.toggle('focused',w===rec.el));renderTasks();try{rec.frame.contentWindow.focus()}catch{}}
function renderTasks(){taskApps.innerHTML=[...windows.values()].map(rec=>`<button class="task-app ${rec.id===activeId&&!rec.minimized?'active':''}" data-task-id="${rec.id}"><img src="${rec.route.icon}" alt=""><span>${rec.route.title}</span></button>`).join('')}
function openApp(appId){const route=routes[appId];if(!route)return;const existing=[...windows.values()].find(w=>w.appId===appId&&!w.closed);if(existing){focusWindow(existing.id);return}const id=`${appId}-${Date.now()}`,el=document.createElement('section');el.className='os-window';el.dataset.windowId=id;el.innerHTML=`<header class="winbar"><span class="winicon"><img src="${route.icon}" alt=""></span><span class="wintitle">${route.title}</span><div class="wincontrols"><button data-action="min" aria-label="Minimizar">—</button><button data-action="max" aria-label="Maximizar">□</button><button class="close" data-action="close" aria-label="Cerrar">×</button></div></header><div class="winbody"><iframe class="winframe" allow="clipboard-read; clipboard-write; fullscreen; autoplay; microphone; camera"></iframe><div class="touch-bridge" aria-label="Pantalla táctil"></div></div><span class="resize-handle"></span>`;windowLayer.appendChild(el);const frame=el.querySelector('iframe');frame.src=route.url;const u=usableRect(),w=Math.max(255,Math.min(u.w*.78,680)),h=Math.max(165,Math.min(u.h*.76,430));spawnOffset=(spawnOffset+18)%90;applyRect(el,{x:10+spawnOffset,y:8+spawnOffset*.36,w,h});const rec={id,appId,route,el,frame,minimized:false,maximized:false,snap:null,restore:null,closed:false};windows.set(id,rec);bindWindow(rec);focusWindow(id);renderTasks();startMenu.classList.remove('open')}
function bindWindow(rec){const{el,id,frame}=rec,bar=el.querySelector('.winbar'),handle=el.querySelector('.resize-handle'),bridge=el.querySelector('.touch-bridge');el.addEventListener('pointerdown',()=>focusWindow(id));el.querySelectorAll('.wincontrols button').forEach(btn=>bindTap(btn,()=>{const action=btn.dataset.action;if(action==='min')minimizeWindow(id);else if(action==='max')toggleMaximize(id);else closeWindow(id)}));
 bar.addEventListener('pointerdown',e=>{if(e.target.closest('.wincontrols'))return;focusWindow(id);if(rec.maximized||rec.snap){restoreWindow(id);const r=rectOf(el),sr=screen.getBoundingClientRect();applyRect(el,{x:e.clientX-sr.left-r.w/2,y:3,w:r.w,h:r.h})}const r=rectOf(el),sr=screen.getBoundingClientRect();dragState={id,pointerId:e.pointerId,dx:e.clientX-sr.left-r.x,dy:e.clientY-sr.top-r.y};bar.setPointerCapture(e.pointerId);e.preventDefault()});bar.addEventListener('pointermove',dragMove);bar.addEventListener('pointerup',dragEnd);bar.addEventListener('pointercancel',dragEnd);
 handle.addEventListener('pointerdown',e=>{focusWindow(id);const r=rectOf(el);resizeState={id,pointerId:e.pointerId,startX:e.clientX,startY:e.clientY,w:r.w,h:r.h};handle.setPointerCapture(e.pointerId);e.preventDefault()});handle.addEventListener('pointermove',resizeMove);handle.addEventListener('pointerup',resizeEnd);handle.addEventListener('pointercancel',resizeEnd);bindTouchBridge(bridge,frame,id)}
function bindTouchBridge(bridge,frame,id){let pointer=null,start=null,last=null,moved=false,started=0,lastTapAt=0;bridge.addEventListener('pointerdown',e=>{if(e.pointerType!=='touch'&&e.pointerType!=='pen')return;focusWindow(id);pointer=e.pointerId;start={x:e.offsetX,y:e.offsetY};last={...start};moved=false;started=Date.now();bridge.setPointerCapture(e.pointerId);e.preventDefault()});bridge.addEventListener('pointermove',e=>{if(e.pointerId!==pointer||!last)return;const p={x:e.offsetX,y:e.offsetY},dx=p.x-last.x,dy=p.y-last.y;if(Math.hypot(p.x-start.x,p.y-start.y)>7){moved=true;bridge.classList.add('dragging');dispatchFrameAt(frame,'wheel',p.x,p.y,{deltaX:-dx*1.4,deltaY:-dy*2.5,buttons:0})}last=p;e.preventDefault()});const finish=e=>{if(e.pointerId!==pointer)return;const p={x:e.offsetX,y:e.offsetY},held=Date.now()-started;if(!moved){const now=Date.now(),dbl=now-lastTapAt<340;frameTap(frame,p.x,p.y,dbl,held>650);lastTapAt=now}bridge.classList.remove('dragging');pointer=null;start=last=null;moved=false;e.preventDefault()};bridge.addEventListener('pointerup',finish);bridge.addEventListener('pointercancel',finish)}
function dragMove(e){if(!dragState||e.pointerId!==dragState.pointerId)return;const rec=windows.get(dragState.id),sr=screen.getBoundingClientRect(),u=usableRect(),r=rectOf(rec.el);applyRect(rec.el,{x:e.clientX-sr.left-dragState.dx,y:e.clientY-sr.top-dragState.dy,w:r.w,h:r.h});if(e.clientY-sr.top<50){snapAssist.classList.add('show');const ratio=(e.clientX-sr.left)/Math.max(1,u.w);snapChoice=ratio<.34?'left':ratio>.66?'right':'max';document.querySelectorAll('.snap-zone').forEach(z=>z.classList.toggle('active',z.dataset.snapZone===snapChoice));showSnapPreview(snapChoice)}else hideSnap();e.preventDefault()}
function dragEnd(e){if(!dragState||e.pointerId!==dragState.pointerId)return;const id=dragState.id;dragState=null;if(snapChoice)applySnap(id,snapChoice);hideSnap();e.preventDefault()}
function resizeMove(e){if(!resizeState||e.pointerId!==resizeState.pointerId)return;const rec=windows.get(resizeState.id),r=rectOf(rec.el);applyRect(rec.el,{x:r.x,y:r.y,w:resizeState.w+(e.clientX-resizeState.startX),h:resizeState.h+(e.clientY-resizeState.startY)});e.preventDefault()}
function resizeEnd(e){if(resizeState&&e.pointerId===resizeState.pointerId){resizeState=null;e.preventDefault()}}
function showSnapPreview(choice){const u=usableRect(),r=choice==='left'?{x:0,y:0,w:u.w/2,h:u.h}:choice==='right'?{x:u.w/2,y:0,w:u.w/2,h:u.h}:{x:0,y:0,w:u.w,h:u.h};Object.assign(snapPreview.style,{left:r.x+'px',top:r.y+'px',width:r.w+'px',height:r.h+'px'});snapPreview.classList.add('show')}
function hideSnap(){snapChoice=null;snapAssist.classList.remove('show');snapPreview.classList.remove('show');document.querySelectorAll('.snap-zone').forEach(z=>z.classList.remove('active'))}
function applySnap(id,choice){const rec=windows.get(id);if(!rec)return;if(!rec.maximized&&!rec.snap)rec.restore=rectOf(rec.el);const u=usableRect(),r=choice==='left'?{x:0,y:0,w:u.w/2,h:u.h}:choice==='right'?{x:u.w/2,y:0,w:u.w/2,h:u.h}:{x:0,y:0,w:u.w,h:u.h};applyRect(rec.el,r);rec.snap=choice;rec.maximized=choice==='max';focusWindow(id)}
function restoreWindow(id){const rec=windows.get(id);if(!rec)return;if(rec.restore)applyRect(rec.el,rec.restore);else{const u=usableRect();applyRect(rec.el,{x:u.w*.12,y:u.h*.1,w:u.w*.76,h:u.h*.76})}rec.maximized=false;rec.snap=null}
function toggleMaximize(id){const rec=windows.get(id);if(!rec)return;if(rec.maximized||rec.snap==='max')restoreWindow(id);else applySnap(id,'max');focusWindow(id)}
function minimizeWindow(id){const rec=windows.get(id);if(!rec)return;rec.minimized=true;rec.el.classList.add('minimized');if(activeId===id){const next=[...windows.values()].filter(w=>!w.minimized&&w.id!==id).sort((a,b)=>(parseInt(b.el.style.zIndex)||0)-(parseInt(a.el.style.zIndex)||0))[0];activeId=next?.id||null;if(next)focusWindow(next.id)}renderTasks()}
function closeWindow(id){const rec=windows.get(id);if(!rec)return;rec.closed=true;rec.frame.src='about:blank';rec.el.remove();windows.delete(id);if(activeId===id)activeId=null;const next=[...windows.values()].filter(w=>!w.minimized).sort((a,b)=>(parseInt(b.el.style.zIndex)||0)-(parseInt(a.el.style.zIndex)||0))[0];if(next)focusWindow(next.id);renderTasks()}
function cascadeWindows(){const u=usableRect();let n=0;for(const rec of windows.values()){rec.el.classList.remove('minimized');rec.minimized=false;rec.maximized=false;rec.snap=null;applyRect(rec.el,{x:8+n*18,y:7+n*15,w:u.w*.72,h:u.h*.7});n=(n+1)%6}const last=[...windows.values()].at(-1);if(last)focusWindow(last.id);renderTasks()}
function activeFrame(){return activeId?windows.get(activeId)?.frame:null}
function screenPoint(){return{x:Math.max(1,Math.min(screen.clientWidth-2,cursorX)),y:Math.max(1,Math.min(screen.clientHeight-2,cursorY))}}
function updateCursor(){const p=screenPoint();cursorX=p.x;cursorY=p.y;cursor.style.left=p.x+'px';cursor.style.top=p.y+'px';cursor.classList.add('visible')}
function hitAtCursor(){const p=screenPoint(),sr=screen.getBoundingClientRect();cursor.style.visibility='hidden';const target=document.elementFromPoint(sr.left+p.x,sr.top+p.y);cursor.style.visibility='';if(!target)return null;const win=target.closest('.os-window');if(win)focusWindow(win.dataset.windowId);if(target.classList.contains('touch-bridge'))return{kind:'frame',frame:target.previousElementSibling};if(target.tagName==='IFRAME')return{kind:'frame',frame:target};return{kind:'parent',target}}
function frameCoords(frame,cssX,cssY){const fr=frame.getBoundingClientRect(),win=frame.contentWindow;return{x:cssX*(win?.innerWidth||fr.width)/Math.max(1,fr.width),y:cssY*(win?.innerHeight||fr.height)/Math.max(1,fr.height)}}
function dispatchFrameAt(frame,type,cssX,cssY,extra={}){try{const win=frame.contentWindow,doc=frame.contentDocument||win.document,p=frameCoords(frame,cssX,cssY),target=doc.elementFromPoint(p.x,p.y)||doc.body,init={bubbles:true,cancelable:true,composed:true,clientX:p.x,clientY:p.y,screenX:p.x,screenY:p.y,button:extra.button??0,buttons:extra.buttons??(type==='mouseup'?0:1),detail:extra.detail??1,deltaX:extra.deltaX||0,deltaY:extra.deltaY||0,deltaMode:0};if(type==='wheel'){target.dispatchEvent(new win.WheelEvent('wheel',init));doc.dispatchEvent(new win.WheelEvent('wheel',init));win.dispatchEvent(new win.WheelEvent('wheel',init));return true}if(type==='mousedown')try{target.focus({preventScroll:true})}catch{}target.dispatchEvent(new win.PointerEvent(type.replace('mouse','pointer'),{...init,pointerId:9,pointerType:'mouse',isPrimary:true}));target.dispatchEvent(new win.MouseEvent(type,init));if((type==='click'||type==='dblclick')&&typeof target.click==='function')try{target.click()}catch{}win.focus();return true}catch{return false}}
function frameTap(frame,x,y,doubleClick=false,right=false){const button=right?2:0;dispatchFrameAt(frame,'mousedown',x,y,{button,buttons:right?2:1,detail:doubleClick?2:1});dispatchFrameAt(frame,'mouseup',x,y,{button,buttons:0,detail:doubleClick?2:1});dispatchFrameAt(frame,right?'contextmenu':doubleClick?'dblclick':'click',x,y,{button,buttons:0,detail:doubleClick?2:1})}
function dispatchCursor(type,extra={}){const hit=hitAtCursor();if(!hit)return false;if(hit.kind==='frame'){const fr=hit.frame.getBoundingClientRect(),sr=screen.getBoundingClientRect(),p=screenPoint();return dispatchFrameAt(hit.frame,type,sr.left+p.x-fr.left,sr.top+p.y-fr.top,extra)}const target=hit.target,p=screenPoint();if(type==='wheel'){const scrollable=target.closest('.start-menu,.task-apps,.scene');if(scrollable)scrollable.scrollBy({left:extra.deltaX||0,top:extra.deltaY||0});return true}const init={bubbles:true,cancelable:true,clientX:p.x,clientY:p.y,button:extra.button??0,buttons:extra.buttons??0,detail:extra.detail??1};try{target.dispatchEvent(new PointerEvent(type.replace('mouse','pointer'),{...init,pointerId:10,pointerType:'mouse',isPrimary:true}));target.dispatchEvent(new MouseEvent(type,init));if((type==='click'||type==='dblclick')&&typeof target.click==='function')target.click();return true}catch{return false}}
function clickCursor(doubleClick=false,right=false){const button=right?2:0;dispatchCursor('mousedown',{button,buttons:right?2:1,detail:doubleClick?2:1});dispatchCursor('mouseup',{button,buttons:0,detail:doubleClick?2:1});dispatchCursor(right?'contextmenu':doubleClick?'dblclick':'click',{button,buttons:0,detail:doubleClick?2:1})}
const keyboardRows=[
[{l:'Esc',k:'Escape',c:'Escape'},{l:'F1',k:'F1',c:'F1'},{l:'F2',k:'F2',c:'F2'},{l:'F3',k:'F3',c:'F3'},{l:'F4',k:'F4',c:'F4'},{l:'F5',k:'F5',c:'F5'},{l:'F6',k:'F6',c:'F6'},{l:'F7',k:'F7',c:'F7'},{l:'F8',k:'F8',c:'F8'},{l:'F9',k:'F9',c:'F9'},{l:'F10',k:'F10',c:'F10'},{l:'F11',k:'F11',c:'F11'},{l:'F12',k:'F12',c:'F12'},{l:'Prt',k:'PrintScreen',c:'PrintScreen'},{l:'Home',k:'Home',c:'Home'},{l:'End',k:'End',c:'End'},{l:'Del',k:'Delete',c:'Delete'}],
[{l:'`',s:'~',c:'Backquote'},{l:'1',s:'!',c:'Digit1'},{l:'2',s:'@',c:'Digit2'},{l:'3',s:'#',c:'Digit3'},{l:'4',s:'$',c:'Digit4'},{l:'5',s:'%',c:'Digit5'},{l:'6',s:'^',c:'Digit6'},{l:'7',s:'&',c:'Digit7'},{l:'8',s:'*',c:'Digit8'},{l:'9',s:'(',c:'Digit9'},{l:'0',s:')',c:'Digit0'},{l:'-',s:'_',c:'Minus'},{l:'=',s:'+',c:'Equal'},{l:'⌫',k:'Backspace',c:'Backspace',w:2}],
[{l:'Tab',k:'Tab',c:'Tab',w:1.45},{l:'Q',c:'KeyQ'},{l:'W',c:'KeyW'},{l:'E',c:'KeyE'},{l:'R',c:'KeyR'},{l:'T',c:'KeyT'},{l:'Y',c:'KeyY'},{l:'U',c:'KeyU'},{l:'I',c:'KeyI'},{l:'O',c:'KeyO'},{l:'P',c:'KeyP'},{l:'[',s:'{',c:'BracketLeft'},{l:']',s:'}',c:'BracketRight'},{l:'\\',s:'|',c:'Backslash',w:1.4}],
[{l:'Caps',k:'CapsLock',c:'CapsLock',w:1.7,t:'caps'},{l:'A',c:'KeyA'},{l:'S',c:'KeyS'},{l:'D',c:'KeyD'},{l:'F',c:'KeyF'},{l:'G',c:'KeyG'},{l:'H',c:'KeyH'},{l:'J',c:'KeyJ'},{l:'K',c:'KeyK'},{l:'L',c:'KeyL'},{l:'Ñ',c:'Semicolon'},{l:';',s:':',c:'Quote'},{l:"'",s:'"',c:'Backquote'},{l:'Enter',k:'Enter',c:'Enter',w:2}],
[{l:'Shift',k:'Shift',c:'ShiftLeft',w:1.9,t:'shift'},{l:'<',s:'>',c:'IntlBackslash'},{l:'Z',c:'KeyZ'},{l:'X',c:'KeyX'},{l:'C',c:'KeyC'},{l:'V',c:'KeyV'},{l:'B',c:'KeyB'},{l:'N',c:'KeyN'},{l:'M',c:'KeyM'},{l:',',s:'<',c:'Comma'},{l:'.',s:'>',c:'Period'},{l:'/',s:'?',c:'Slash'},{l:'Shift',k:'Shift',c:'ShiftRight',w:1.7,t:'shift'},{l:'↑',k:'ArrowUp',c:'ArrowUp'}],
[{l:'Ctrl',k:'Control',c:'ControlLeft',w:1.25,t:'ctrl'},{l:'Fn',k:'Fn',c:'Fn',w:1},{l:'Win',k:'Meta',c:'MetaLeft',w:1.25,t:'meta'},{l:'Alt',k:'Alt',c:'AltLeft',w:1.15,t:'alt'},{l:'Espacio',k:' ',c:'Space',w:5.2},{l:'AltGr',k:'AltGraph',c:'AltRight',w:1.35,t:'alt'},{l:'Menú',k:'ContextMenu',c:'ContextMenu',w:1.2},{l:'Ctrl',k:'Control',c:'ControlRight',w:1.25,t:'ctrl'},{l:'←',k:'ArrowLeft',c:'ArrowLeft'},{l:'↓',k:'ArrowDown',c:'ArrowDown'},{l:'→',k:'ArrowRight',c:'ArrowRight'}]
];
function keyOutput(def){if(def.k!==undefined)return{key:def.k,code:def.c||def.k};const base=def.l,isLetter=/^[A-ZÑ]$/.test(base);return{key:isLetter?((caps!==shift)?base:base.toLowerCase()):(shift&&def.s!==undefined?def.s:base),code:def.c||'Unidentified'}}
function emitKeyboard(type,spec){const frame=activeFrame();if(!frame)return;try{const win=frame.contentWindow,doc=frame.contentDocument||win.document,target=doc.activeElement||doc.body,init={key:spec.key,code:spec.code,bubbles:true,cancelable:true,composed:true,ctrlKey:ctrl,altKey:alt,shiftKey:shift,metaKey:meta,repeat:false};for(const dest of [target,doc,win])dest.dispatchEvent(new win.KeyboardEvent(type,init));win.focus()}catch{}}
function clearMomentary(){for(const [name,val] of [['shift',shift],['ctrl',ctrl],['alt',alt],['meta',meta]])if(val)document.querySelectorAll(`[data-toggle="${name}"]`).forEach(b=>b.classList.remove('active'));shift=ctrl=alt=meta=false}
function pressKey(def,button){if(def.t==='caps'){caps=!caps;button.classList.toggle('active',caps);return}if(def.t){const current={shift,ctrl,alt,meta}[def.t],next=!current;if(def.t==='shift')shift=next;if(def.t==='ctrl')ctrl=next;if(def.t==='alt')alt=next;if(def.t==='meta')meta=next;document.querySelectorAll(`[data-toggle="${def.t}"]`).forEach(b=>b.classList.toggle('active',next));return}if(def.k==='Fn')return;const spec=keyOutput(def);emitKeyboard('keydown',spec);emitKeyboard('keypress',spec);emitKeyboard('keyup',spec);clearMomentary()}
keyboard.innerHTML=keyboardRows.map((row,ri)=>`<div class="keyboard-row">${row.map((k,ki)=>`<button type="button" class="key" style="--w:${k.w||1}" data-row="${ri}" data-key-index="${ki}" ${k.t?`data-toggle="${k.t}"`:''}>${k.l}</button>`).join('')}</div>`).join('');
bindTapDelegate(keyboard,'[data-row]',b=>pressKey(keyboardRows[Number(b.dataset.row)][Number(b.dataset.keyIndex)],b));
trackpad.addEventListener('pointerdown',e=>{padPointer=e.pointerId;padLast={x:e.clientX,y:e.clientY};padMoved=0;padScroll=e.offsetX>trackpad.clientWidth*.78;trackpad.setPointerCapture(e.pointerId);trackpad.classList.add('active');trackpad.classList.toggle('scroll',padScroll);updateCursor();e.preventDefault()});
trackpad.addEventListener('pointermove',e=>{if(e.pointerId!==padPointer||!padLast)return;const dx=(e.clientX-padLast.x)*2.15,dy=(e.clientY-padLast.y)*2.15;padMoved+=Math.abs(dx)+Math.abs(dy);if(padScroll)dispatchCursor('wheel',{buttons:0,deltaX:dx*1.5,deltaY:dy*2});else{cursorX+=dx;cursorY+=dy;updateCursor();dispatchCursor('mousemove',{buttons:0})}padLast={x:e.clientX,y:e.clientY};e.preventDefault()});
function endPad(e){if(e.pointerId!==padPointer)return;trackpad.classList.remove('active','scroll');if(!padScroll&&padMoved<10){const now=Date.now(),dbl=now-lastTap<340;clickCursor(dbl);lastTap=now}padPointer=null;padLast=null;padScroll=false;e.preventDefault()}
trackpad.addEventListener('pointerup',endPad);trackpad.addEventListener('pointercancel',endPad);
bindTap(document.querySelector('#leftClick'),()=>clickCursor(false,false));bindTap(document.querySelector('#rightClick'),()=>clickCursor(false,true));
nativeInput.addEventListener('input',()=>{for(const ch of nativeInput.value){const spec={key:ch,code:/[a-z]/i.test(ch)?'Key'+ch.toUpperCase():'Unidentified'};emitKeyboard('keydown',spec);emitKeyboard('keypress',spec);emitKeyboard('keyup',spec)}nativeInput.value=''});
bindTapDelegate(desktopIcons,'[data-app]',b=>openApp(b.dataset.app));bindTapDelegate(startApps,'[data-menu-app]',b=>openApp(b.dataset.menuApp));bindTapDelegate(taskApps,'[data-task-id]',b=>{const id=b.dataset.taskId,rec=windows.get(id);if(!rec)return;if(id===activeId&&!rec.minimized)minimizeWindow(id);else focusWindow(id)});
bindTap(document.querySelector('#powerBtn'),boot);bindTap(document.querySelector('#startButton'),()=>startMenu.classList.toggle('open'));bindTap(document.querySelector('#menuCascade'),()=>{startMenu.classList.remove('open');cascadeWindows()});bindTap(document.querySelector('#menuCenter'),()=>{startMenu.classList.remove('open');centerLaptop()});bindTap(document.querySelector('#menuPower'),powerOff);bindTap(document.querySelector('#centerButton'),()=>centerLaptop());

window.addEventListener('resize',()=>centerLaptop('auto'));window.addEventListener('orientationchange',()=>setTimeout(()=>centerLaptop('auto'),250));
setInterval(()=>{const n=new Date();document.querySelector('#clock').innerHTML=`<b>${n.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}</b><br>${n.toLocaleDateString('es-MX')}`},1000);
if(localStorage.getItem('ander-linux-on')==='1')boot();else centerLaptop('auto');
