<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#050816">
<title>ANDER CLOUD PC Linux</title>
<style>
:root{--bg:#050816;--panel:#0b1020;--line:rgba(150,170,255,.2);--text:#f5f7ff;--muted:#99a5c7;--a:#438cff;--b:#8b5cf6}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 20% 10%,#19265c55,transparent 35%),linear-gradient(150deg,#02040b,#080b20);color:var(--text);font-family:Inter,system-ui,sans-serif}
button{font:inherit;color:inherit}
.scene{height:100%;display:grid;place-items:start center;padding:14px 8px;overflow:auto;touch-action:pan-y}
.laptop{width:min(1080px,126vw);transform:scale(.77);transform-origin:top center;filter:drop-shadow(0 35px 50px #000a)}
.display{width:88%;margin:auto;padding:14px 14px 19px;border-radius:24px 24px 10px 10px;background:linear-gradient(145deg,#252b36,#080b12 60%,#1b202a);position:relative}
.display:after{content:'ANDER';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:8px;letter-spacing:4px;color:#8490a5}
.camera{position:absolute;top:5px;left:50%;width:6px;height:6px;border-radius:50%;background:#244a88;z-index:8}
.screen{aspect-ratio:16/9;border-radius:12px;overflow:hidden;background:#02040a;position:relative;contain:paint;touch-action:auto}
.power,.desktop,.appview{position:absolute;inset:0}
.power{display:grid;place-content:center;text-align:center;gap:18px;background:radial-gradient(circle,#101a38,#010309 70%)}
.power h1{letter-spacing:.22em;margin:0;color:#ffffff18}
.power button{width:76px;height:76px;margin:auto;border:1px solid #ffffff25;border-radius:50%;background:#ffffff08;font-size:34px}
.desktop{display:none;background:radial-gradient(circle at 18% 12%,#3677ff66,transparent 34%),radial-gradient(circle at 85% 20%,#a147ff55,transparent 37%),linear-gradient(145deg,#05102d,#183d91 52%,#532e89);padding:22px 22px 58px}
.desktop.active{display:block}
.icons{display:grid;grid-template-columns:repeat(4,78px);gap:16px}
.icon{border:0;background:transparent;display:grid;justify-items:center;gap:7px;text-align:center;font-size:11px;font-weight:700}
.tile{width:50px;height:50px;border-radius:15px;display:grid;place-items:center;font-size:22px;font-weight:900;box-shadow:0 11px 24px #0005,inset 0 1px #fff4}
.linux{background:linear-gradient(145deg,#202a3c,#0b0f18)}
.browser{background:conic-gradient(#42d4ff,#4a66ff,#a84eff,#42d4ff)}
.code{background:linear-gradient(145deg,#2cc8ff,#0879dc)}
.files{background:linear-gradient(145deg,#ffcc69,#f08b2c)}
.terminal{background:linear-gradient(145deg,#1d2738,#080b12);color:#6ff0a7}
.settings{background:linear-gradient(145deg,#9eacc1,#4b5d78)}
.task{position:absolute;left:0;right:0;bottom:0;height:48px;background:#050a19e8;border-top:1px solid var(--line);display:flex;align-items:center;gap:9px;padding:7px 12px}
.start{width:34px;height:34px;border:0;border-radius:10px;background:linear-gradient(145deg,var(--a),var(--b));font-weight:900}
.clock{margin-left:auto;text-align:right;font-size:10px}
.hint{position:absolute;right:12px;top:10px;padding:7px 9px;border-radius:10px;background:#050816c9;border:1px solid var(--line);font-size:9px;color:var(--muted)}
.appview{display:none;background:#050816}
.appview.active{display:block}
.appbar{height:38px;background:#11172b;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 8px;gap:8px;font-size:11px}
.appbar strong{flex:1}
.appbar button{width:29px;height:29px;border:0;border-radius:8px;background:#ffffff08}
.frame-wrap{position:relative;width:100%;height:calc(100% - 38px);overflow:hidden}
.frame{width:100%;height:100%;border:0;background:#03050b;touch-action:auto}
.touch-surface{position:absolute;inset:0;z-index:15;pointer-events:none;touch-action:none;background:transparent}
.touch-surface.scrolling{cursor:grabbing}
.virtual-cursor{position:absolute;left:40px;top:40px;width:17px;height:22px;pointer-events:none;z-index:20;opacity:0;transform:translate3d(-2px,-2px,0);transition:opacity .15s ease}
.virtual-cursor.visible{opacity:1}
.virtual-cursor svg{width:100%;height:100%;filter:drop-shadow(0 1px 1px #000)}
.hinge{height:19px;width:92%;margin:auto;border-radius:0 0 17px 17px;background:linear-gradient(#202630,#080b10)}
.base{height:410px;border-radius:11px 11px 35px 35px;background:linear-gradient(145deg,#1b2029,#0e121a 65%,#202630);padding:25px 38px;position:relative}
.keyboard{display:grid;gap:5px}
.keyboard-row{display:flex;gap:5px;width:100%}
.key{height:27px;min-width:0;flex:var(--w,1) 1 0;border:1px solid #ffffff06;border-radius:6px;background:linear-gradient(#121823,#060910);box-shadow:inset 0 1px #ffffff12;color:#7f8ba3;display:grid;place-items:center;padding:0 3px;font-size:8px;line-height:1;user-select:none;touch-action:manipulation;white-space:nowrap}
.key:active,.key.active{transform:translateY(1px);background:linear-gradient(#1c2638,#0a0e17);color:#eef3ff;border-color:#4d8cff55}
.trackpad{width:245px;height:84px;border:1px solid #394151;border-radius:15px;margin:19px auto 0;background:linear-gradient(145deg,#0a0e16,#0d121d);position:relative;touch-action:none;overflow:hidden}
.trackpad:before{content:'TOUCHPAD';position:absolute;inset:0;display:grid;place-items:center;color:#536077;font-size:9px;letter-spacing:3px}
.trackpad:after{content:'';position:absolute;right:9px;top:10px;bottom:10px;width:4px;border-radius:999px;background:linear-gradient(#ffffff08,#4f78cf66,#ffffff08)}
.trackpad.active{border-color:#4d8cff;box-shadow:0 0 0 1px #4d8cff55}
.trackpad.scroll:before{content:'SCROLL'}
.status{position:absolute;right:46px;bottom:24px;width:8px;height:8px;border-radius:50%;background:#53ef9b;box-shadow:0 0 15px #53ef9b}
.native-input{position:fixed;left:-1000px;top:-1000px;width:1px;height:1px;opacity:0}
@media(pointer:coarse){.touch-surface{pointer-events:auto}}
@media(max-width:760px){.scene{padding-top:8px}.laptop{width:132vw;transform:scale(.72)}.base{height:405px;padding:22px 28px}.icons{grid-template-columns:repeat(4,68px);gap:13px}.tile{width:45px;height:45px}.key{height:26px;font-size:7.5px}.trackpad{width:235px;height:80px;margin-top:17px}}
</style>
</head>
<body>
<main class="scene"><section class="laptop">
<div class="display"><span class="camera"></span><div class="screen" id="screen">
<section class="power" id="power"><h1>ANDER</h1><button id="powerBtn">⏻</button><span>Presiona para encender Linux</span></section>
<section class="desktop" id="desktop"><div class="hint">Toca, desliza o usa el touchpad</div><div class="icons">
<button class="icon" data-app="linux"><span class="tile linux">LX</span><span>Linux</span></button>
<button class="icon" data-app="browser"><span class="tile browser">◉</span><span>Navegador</span></button>
<button class="icon" data-app="code"><span class="tile code">&lt;/&gt;</span><span>VS Code</span></button>
<button class="icon" data-app="files"><span class="tile files">▰</span><span>Archivos</span></button>
<button class="icon" data-app="terminal"><span class="tile terminal">&gt;_</span><span>Terminal</span></button>
<button class="icon" data-app="settings"><span class="tile settings">⚙</span><span>Ajustes</span></button>
</div><nav class="task"><button class="start">A</button><span>ANDER CLOUD PC</span><div class="clock" id="clock"></div></nav></section>
<section class="appview" id="appview"><header class="appbar"><button id="back">←</button><strong id="title">Aplicación</strong><button id="mobileKeyboard" title="Teclado del celular">⌨</button><button id="reload">↻</button><button id="close">×</button></header><div class="frame-wrap" id="frameWrap"><iframe class="frame" id="frame" allow="clipboard-read; clipboard-write; fullscreen; autoplay; microphone; camera"></iframe><div class="touch-surface" id="touchSurface" aria-label="Pantalla táctil"></div><span class="virtual-cursor" id="cursor"><svg viewBox="0 0 20 26" aria-hidden="true"><path d="M2 1v20l5-5 4 8 4-2-4-8h7L2 1Z" fill="#fff" stroke="#111" stroke-width="1.4"/></svg></span></div></section>
</div></div><div class="hinge"></div><div class="base"><div class="keyboard" id="keyboard"></div><div class="trackpad" id="trackpad"></div><span class="status"></span></div>
</section></main>
<textarea class="native-input" id="nativeInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
<script>
const routes={linux:{title:'ANDER Linux',url:'/linux/'},browser:{title:'Chromium',url:'/browser/'},code:{title:'Visual Studio Code',url:'/code/'},files:{title:'Archivos Linux',url:'/linux/'},terminal:{title:'Terminal Linux',url:'/linux/'},settings:{title:'Ajustes Linux',url:'/linux/'}};
const power=document.querySelector('#power'),desktop=document.querySelector('#desktop'),appview=document.querySelector('#appview'),frame=document.querySelector('#frame'),frameWrap=document.querySelector('#frameWrap'),touchSurface=document.querySelector('#touchSurface'),title=document.querySelector('#title'),cursor=document.querySelector('#cursor'),trackpad=document.querySelector('#trackpad'),keyboard=document.querySelector('#keyboard'),nativeInput=document.querySelector('#nativeInput');
let cursorX=80,cursorY=70,padPointer=null,padLast=null,padMoved=0,padScroll=false,lastTap=0,caps=false,shift=false,ctrl=false,alt=false,meta=false;
let screenPointer=null,screenStart=null,screenLast=null,screenMoved=false,screenStartedAt=0,lastScreenTap=0;
function boot(){power.style.display='none';desktop.classList.add('active');localStorage.setItem('ander-linux-on','1')}
function openApp(id){const app=routes[id];if(!app)return;title.textContent=app.title;frame.src=app.url;desktop.classList.remove('active');appview.classList.add('active');setTimeout(()=>{cursorX=frameWrap.clientWidth/2;cursorY=frameWrap.clientHeight/2;updateCursor();try{frame.contentWindow.focus()}catch{}},500)}
function closeApp(){frame.src='about:blank';appview.classList.remove('active');desktop.classList.add('active');cursor.classList.remove('visible')}
function frameDocument(){try{return frame.contentDocument||frame.contentWindow.document}catch{return null}}
function framePoint(){const w=Math.max(1,frameWrap.clientWidth),h=Math.max(1,frameWrap.clientHeight);return{x:Math.max(1,Math.min(w-2,cursorX)),y:Math.max(1,Math.min(h-2,cursorY))}}
function updateCursor(){const p=framePoint();cursorX=p.x;cursorY=p.y;cursor.style.left=p.x+'px';cursor.style.top=p.y+'px';cursor.classList.add('visible')}
function targetAtCursor(){const doc=frameDocument();if(!doc)return null;const p=framePoint();return doc.elementFromPoint(p.x,p.y)||doc.body}
function dispatchMouse(type,extra={}){const win=frame.contentWindow,doc=frameDocument(),target=targetAtCursor();if(!win||!doc||!target)return false;const p=framePoint();const init={bubbles:true,cancelable:true,composed:true,clientX:p.x,clientY:p.y,screenX:p.x,screenY:p.y,button:extra.button??0,buttons:extra.buttons??(type==='mouseup'?0:1),detail:extra.detail??1,deltaX:extra.deltaX||0,deltaY:extra.deltaY||0,deltaMode:0};try{if(type==='wheel'){target.dispatchEvent(new win.WheelEvent(type,init));win.dispatchEvent(new win.WheelEvent(type,init))}else{target.dispatchEvent(new win.PointerEvent(type.replace('mouse','pointer'),{...init,pointerId:1,pointerType:'mouse',isPrimary:true}));target.dispatchEvent(new win.MouseEvent(type,init))}return true}catch{return false}}
function clickCursor(doubleClick=false,rightClick=false){const button=rightClick?2:0;dispatchMouse('mousedown',{button,buttons:rightClick?2:1,detail:doubleClick?2:1});dispatchMouse('mouseup',{button,buttons:0,detail:doubleClick?2:1});dispatchMouse(rightClick?'contextmenu':doubleClick?'dblclick':'click',{button,buttons:0,detail:doubleClick?2:1});try{frame.contentWindow.focus()}catch{}}
const keyboardRows=[
[{l:'Esc',k:'Escape',c:'Escape'},{l:'F1',k:'F1',c:'F1'},{l:'F2',k:'F2',c:'F2'},{l:'F3',k:'F3',c:'F3'},{l:'F4',k:'F4',c:'F4'},{l:'F5',k:'F5',c:'F5'},{l:'F6',k:'F6',c:'F6'},{l:'F7',k:'F7',c:'F7'},{l:'F8',k:'F8',c:'F8'},{l:'F9',k:'F9',c:'F9'},{l:'F10',k:'F10',c:'F10'},{l:'F11',k:'F11',c:'F11'},{l:'F12',k:'F12',c:'F12'},{l:'Prt',k:'PrintScreen',c:'PrintScreen'},{l:'Home',k:'Home',c:'Home'},{l:'End',k:'End',c:'End'},{l:'Del',k:'Delete',c:'Delete'}],
[{l:'`',s:'~',c:'Backquote'},{l:'1',s:'!',c:'Digit1'},{l:'2',s:'@',c:'Digit2'},{l:'3',s:'#',c:'Digit3'},{l:'4',s:'$',c:'Digit4'},{l:'5',s:'%',c:'Digit5'},{l:'6',s:'^',c:'Digit6'},{l:'7',s:'&',c:'Digit7'},{l:'8',s:'*',c:'Digit8'},{l:'9',s:'(',c:'Digit9'},{l:'0',s:')',c:'Digit0'},{l:'-',s:'_',c:'Minus'},{l:'=',s:'+',c:'Equal'},{l:'⌫',k:'Backspace',c:'Backspace',w:2}],
[{l:'Tab',k:'Tab',c:'Tab',w:1.45},{l:'Q',c:'KeyQ'},{l:'W',c:'KeyW'},{l:'E',c:'KeyE'},{l:'R',c:'KeyR'},{l:'T',c:'KeyT'},{l:'Y',c:'KeyY'},{l:'U',c:'KeyU'},{l:'I',c:'KeyI'},{l:'O',c:'KeyO'},{l:'P',c:'KeyP'},{l:'[',s:'{',c:'BracketLeft'},{l:']',s:'}',c:'BracketRight'},{l:'\\',s:'|',c:'Backslash',w:1.4}],
[{l:'Caps',k:'CapsLock',c:'CapsLock',w:1.7,t:'caps'},{l:'A',c:'KeyA'},{l:'S',c:'KeyS'},{l:'D',c:'KeyD'},{l:'F',c:'KeyF'},{l:'G',c:'KeyG'},{l:'H',c:'KeyH'},{l:'J',c:'KeyJ'},{l:'K',c:'KeyK'},{l:'L',c:'KeyL'},{l:'Ñ',c:'Semicolon'},{l:';',s:':',c:'Quote'},{l:"'",s:'"',c:'Backquote'},{l:'Enter',k:'Enter',c:'Enter',w:2}],
[{l:'Shift',k:'Shift',c:'ShiftLeft',w:1.9,t:'shift'},{l:'<',s:'>',c:'IntlBackslash'},{l:'Z',c:'KeyZ'},{l:'X',c:'KeyX'},{l:'C',c:'KeyC'},{l:'V',c:'KeyV'},{l:'B',c:'KeyB'},{l:'N',c:'KeyN'},{l:'M',c:'KeyM'},{l:',',s:'<',c:'Comma'},{l:'.',s:'>',c:'Period'},{l:'/',s:'?',c:'Slash'},{l:'Shift',k:'Shift',c:'ShiftRight',w:1.7,t:'shift'},{l:'↑',k:'ArrowUp',c:'ArrowUp'}],
[{l:'Ctrl',k:'Control',c:'ControlLeft',w:1.25,t:'ctrl'},{l:'Fn',k:'Fn',c:'Fn',w:1},{l:'Win',k:'Meta',c:'MetaLeft',w:1.25,t:'meta'},{l:'Alt',k:'Alt',c:'AltLeft',w:1.15,t:'alt'},{l:'Espacio',k:' ',c:'Space',w:5.2},{l:'AltGr',k:'AltGraph',c:'AltRight',w:1.35,t:'alt'},{l:'Menú',k:'ContextMenu',c:'ContextMenu',w:1.2},{l:'Ctrl',k:'Control',c:'ControlRight',w:1.25,t:'ctrl'},{l:'←',k:'ArrowLeft',c:'ArrowLeft'},{l:'↓',k:'ArrowDown',c:'ArrowDown'},{l:'→',k:'ArrowRight',c:'ArrowRight'}]
];
function keyOutput(def){if(def.k!==undefined)return{key:def.k,code:def.c||def.k};const base=def.l;const isLetter=/^[A-ZÑ]$/.test(base);let key=isLetter?((caps!==shift)?base:base.toLowerCase()):(shift&&def.s!==undefined?def.s:base);return{key,code:def.c||'Unidentified'}}
function emitKeyboard(type,spec){const win=frame.contentWindow,doc=frameDocument();if(!win||!doc)return;const init={key:spec.key,code:spec.code,bubbles:true,cancelable:true,composed:true,ctrlKey:ctrl,altKey:alt,shiftKey:shift,metaKey:meta,repeat:false};const targets=[doc.activeElement||doc.body,doc,win];for(const target of targets){try{target.dispatchEvent(new win.KeyboardEvent(type,init))}catch{}}
if(type==='keydown'){const target=doc.activeElement;if(target&&'value'in target){if(spec.key==='Backspace'){const start=target.selectionStart??target.value.length,end=target.selectionEnd??start;if(start!==end||start>0){const from=start===end?start-1:start;target.value=target.value.slice(0,from)+target.value.slice(end);target.selectionStart=target.selectionEnd=Math.max(0,from);target.dispatchEvent(new win.InputEvent('input',{bubbles:true,inputType:'deleteContentBackward'}))}}else if(spec.key==='Enter'&&target.tagName==='TEXTAREA'){const start=target.selectionStart??target.value.length,end=target.selectionEnd??start;target.value=target.value.slice(0,start)+'\n'+target.value.slice(end);target.selectionStart=target.selectionEnd=start+1;target.dispatchEvent(new win.InputEvent('input',{bubbles:true,inputType:'insertLineBreak',data:'\n'}))}else if(spec.key.length===1){const start=target.selectionStart??target.value.length,end=target.selectionEnd??start;target.value=target.value.slice(0,start)+spec.key+target.value.slice(end);target.selectionStart=target.selectionEnd=start+spec.key.length;target.dispatchEvent(new win.InputEvent('input',{bubbles:true,inputType:'insertText',data:spec.key}))}}}
try{win.focus()}catch{}}
function clearMomentary(){if(shift){shift=false;document.querySelectorAll('[data-toggle="shift"]').forEach(b=>b.classList.remove('active'))}if(ctrl){ctrl=false;document.querySelectorAll('[data-toggle="ctrl"]').forEach(b=>b.classList.remove('active'))}if(alt){alt=false;document.querySelectorAll('[data-toggle="alt"]').forEach(b=>b.classList.remove('active'))}if(meta){meta=false;document.querySelectorAll('[data-toggle="meta"]').forEach(b=>b.classList.remove('active'))}}
function pressKey(def,button){if(def.t==='caps'){caps=!caps;button.classList.toggle('active',caps);return}if(def.t){const state={shift,ctrl,alt,meta}[def.t];const next=!state;if(def.t==='shift')shift=next;if(def.t==='ctrl')ctrl=next;if(def.t==='alt')alt=next;if(def.t==='meta')meta=next;document.querySelectorAll(`[data-toggle="${def.t}"]`).forEach(b=>b.classList.toggle('active',next));return}if(def.k==='Fn')return;const spec=keyOutput(def);emitKeyboard('keydown',spec);emitKeyboard('keypress',spec);emitKeyboard('keyup',spec);clearMomentary()}
keyboard.innerHTML=keyboardRows.map((row,ri)=>`<div class="keyboard-row">${row.map((k,ki)=>`<button type="button" class="key" style="--w:${k.w||1}" data-row="${ri}" data-key-index="${ki}" ${k.t?`data-toggle="${k.t}"`:''}>${k.l}</button>`).join('')}</div>`).join('');
keyboard.addEventListener('pointerdown',e=>{const b=e.target.closest('[data-row]');if(!b)return;e.preventDefault();pressKey(keyboardRows[Number(b.dataset.row)][Number(b.dataset.keyIndex)],b)});
trackpad.addEventListener('pointerdown',e=>{padPointer=e.pointerId;padLast={x:e.clientX,y:e.clientY};padMoved=0;padScroll=e.offsetX>trackpad.clientWidth*.78;trackpad.setPointerCapture(e.pointerId);trackpad.classList.add('active');trackpad.classList.toggle('scroll',padScroll);updateCursor()});
trackpad.addEventListener('pointermove',e=>{if(e.pointerId!==padPointer||!padLast)return;e.preventDefault();const dx=(e.clientX-padLast.x)*2.1,dy=(e.clientY-padLast.y)*2.1;padMoved+=Math.abs(dx)+Math.abs(dy);if(padScroll){dispatchMouse('wheel',{buttons:0,deltaX:dx*1.5,deltaY:dy*2})}else{cursorX+=dx;cursorY+=dy;updateCursor();dispatchMouse('mousemove',{buttons:0})}padLast={x:e.clientX,y:e.clientY}});
function endPad(e){if(e.pointerId!==padPointer)return;trackpad.classList.remove('active','scroll');if(!padScroll&&padMoved<10){const now=Date.now(),dbl=now-lastTap<340;clickCursor(dbl);lastTap=now}padPointer=null;padLast=null;padScroll=false}
trackpad.addEventListener('pointerup',endPad);trackpad.addEventListener('pointercancel',endPad);
touchSurface.addEventListener('pointerdown',e=>{if(e.pointerType!=='touch'&&e.pointerType!=='pen')return;screenPointer=e.pointerId;screenStart={x:e.offsetX,y:e.offsetY};screenLast={x:e.offsetX,y:e.offsetY};screenMoved=false;screenStartedAt=Date.now();cursorX=e.offsetX;cursorY=e.offsetY;updateCursor();touchSurface.setPointerCapture(e.pointerId);e.preventDefault()});
touchSurface.addEventListener('pointermove',e=>{if(e.pointerId!==screenPointer||!screenLast)return;const x=e.offsetX,y=e.offsetY,dx=x-screenLast.x,dy=y-screenLast.y,total=Math.hypot(x-screenStart.x,y-screenStart.y);cursorX=x;cursorY=y;updateCursor();if(total>7){screenMoved=true;touchSurface.classList.add('scrolling');dispatchMouse('wheel',{buttons:0,deltaX:-dx*1.25,deltaY:-dy*2.4})}screenLast={x,y};e.preventDefault()});
function endScreen(e){if(e.pointerId!==screenPointer)return;const held=Date.now()-screenStartedAt;if(!screenMoved){cursorX=e.offsetX;cursorY=e.offsetY;updateCursor();const now=Date.now(),dbl=now-lastScreenTap<340;clickCursor(dbl,held>650);lastScreenTap=now}touchSurface.classList.remove('scrolling');screenPointer=null;screenStart=null;screenLast=null;screenMoved=false;e.preventDefault()}
touchSurface.addEventListener('pointerup',endScreen);touchSurface.addEventListener('pointercancel',endScreen);
nativeInput.addEventListener('input',()=>{const text=nativeInput.value;for(const ch of text){const spec={key:ch,code:/[a-z]/i.test(ch)?'Key'+ch.toUpperCase():'Unidentified'};emitKeyboard('keydown',spec);emitKeyboard('keypress',spec);emitKeyboard('keyup',spec)}nativeInput.value=''});
document.querySelector('#mobileKeyboard').onclick=()=>{nativeInput.value='';nativeInput.focus()};
document.querySelector('#powerBtn').onclick=boot;
document.addEventListener('click',e=>{const b=e.target.closest('[data-app]');if(b)openApp(b.dataset.app)});
document.querySelector('#close').onclick=closeApp;
document.querySelector('#back').onclick=()=>{try{frame.contentWindow.history.back()}catch{}};
document.querySelector('#reload').onclick=()=>{frame.src=frame.src};
frame.addEventListener('load',()=>{try{frame.contentWindow.focus()}catch{}});
setInterval(()=>{const n=new Date();document.querySelector('#clock').innerHTML=`<b>${n.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}</b><br>${n.toLocaleDateString('es-MX')}`},1000);
if(localStorage.getItem('ander-linux-on')==='1')boot();
</script>
</body>
</html>
