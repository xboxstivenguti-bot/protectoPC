<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>ANDER CLOUD PC</title>
<style>
html,body{margin:0;width:100%;height:100%;background:#050816;color:#fff;font-family:system-ui,sans-serif}
.loading{height:100%;display:grid;place-content:center;text-align:center;gap:12px}
.loading b{letter-spacing:.22em}.loading span{color:#99a5c7;font-size:13px}
</style>
</head>
<body>
<div class="loading"><b>ANDER CLOUD PC</b><span>Preparando sistema estable…</span></div>
<script>
(async()=>{
  try{
    const response=await fetch('/index.html?v=stable-v6',{cache:'no-store'});
    if(!response.ok) throw new Error(`HTTP ${response.status}`);
    let html=await response.text();
    html=html.replace('</head>','<link rel="stylesheet" href="/mobile-v3.css?v=6"><link rel="stylesheet" href="/mobile-v5.css?v=6"></head>');
    html=html.replace('</body>','<script src="/mobile-v6.js?v=6"><\/script></body>');
    document.open();
    document.write(html);
    document.close();
  }catch(error){
    document.body.innerHTML=`<div class="loading"><b>ANDER CLOUD PC</b><span>No se pudo cargar la interfaz: ${String(error.message||error)}</span></div>`;
  }
})();
</script>
</body>
</html>
