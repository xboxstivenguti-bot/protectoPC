services:
  gateway:
    image: caddy:2-alpine
    container_name: ander-gateway
    ports:
      - "${ANDER_PORT:-8080}:8080"
    volumes:
      - ./frontend:/srv:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - linux
      - browser
      - code
      - powershell
      - api
    restart: unless-stopped

  api:
    build:
      context: ./api
    image: ander-api:v1
    pull_policy: never
    container_name: ander-api
    environment:
      - API_PORT=3300
    volumes:
      - ./data/workspace:/workspace:ro
      - ./package.json:/repo/package.json:ro
      - ./.git:/repo/.git:ro
    restart: unless-stopped

  linux-clean:
    image: alpine:3.21
    container_name: ander-linux-clean
    volumes:
      - ./data/linux:/config
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /config/.config/xfce4/xfconf/xfce-perchannel-xml /config/.config/autostart
        PANEL_XML=/config/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-panel.xml
        if [ ! -f "$$PANEL_XML" ]; then
          {
            echo '<?xml version="1.1" encoding="UTF-8"?>'
            echo ''
            echo '<channel name="xfce4-panel" version="1.0">'
            echo '  <property name="configver" type="int" value="2"/>'
            echo '  <property name="panels" type="empty"/>'
            echo '</channel>'
          } > "$$PANEL_XML"
        fi
        {
          echo '[Desktop Entry]'
          echo 'Type=Application'
          echo 'Name=ANDER Hide Panel'
          echo 'Comment=Oculta el panel de XFCE porque ya existe la barra de tareas de ANDER'
          echo 'Exec=sh -c "sleep 3 && pkill -f xfce4-panel"'
          echo 'X-GNOME-Autostart-enabled=true'
          echo 'NoDisplay=true'
        } > /config/.config/autostart/ander-hide-panel.desktop
        chown -R ${PUID:-1000}:${PGID:-1000} /config/.config/xfce4 /config/.config/autostart 2>/dev/null || true
    restart: "no"

  linux:
    image: lscr.io/linuxserver/webtop:debian-xfce
    container_name: ander-linux
    depends_on:
      linux-clean:
        condition: service_completed_successfully
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Mexico_City}
      - TITLE=ANDER Linux
      - SUBFOLDER=/linux/
      - LC_ALL=es_MX.UTF-8
      - FILE_MANAGER_PATH=/config/workspace
      - START_DOCKER=false
      - PIXELFLUX_WAYLAND=false
      - DISABLE_ZINK=true
      - DISABLE_DRI3=true
      - "SELKIES_USE_CPU=true|locked"
      - SELKIES_ENCODER=jpeg
      - SELKIES_FRAMERATE=30
      - SELKIES_MANUAL_WIDTH=1024
      - SELKIES_MANUAL_HEIGHT=768
      - MAX_RES=1024x768
      - SELKIES_FORCE_ALIGNED_RESOLUTION=true
      - SELKIES_SCALING_DPI=82
      - SELKIES_USE_CSS_SCALING=true
      - SELKIES_USE_BROWSER_CURSORS=true
      - SELKIES_UI_SIDEBAR_SHOW_TRACKPAD=true
      - SELKIES_UI_SIDEBAR_SHOW_KEYBOARD_BUTTON=true
      - SELKIES_UI_SIDEBAR_SHOW_SOFT_BUTTONS=true
      - SELKIES_UI_SHOW_SIDEBAR=false|locked
      - SELKIES_AUDIO_ENABLED=true
      - SELKIES_MICROPHONE_ENABLED=true
      - SELKIES_CLIPBOARD_ENABLED=true
      - SELKIES_FILE_TRANSFERS=upload,download
    volumes:
      - ./data/linux:/config
      - ./data/workspace:/config/workspace
    shm_size: "1gb"
    restart: unless-stopped

  browser-clean:
    image: alpine:3.21
    container_name: ander-browser-clean
    volumes:
      - ./data/chromium:/config
    command:
      - sh
      - -c
      - |
        find /config -type f -name SingletonLock -delete 2>/dev/null || true
        find /config -type f -name SingletonSocket -delete 2>/dev/null || true
        find /config -type f -name SingletonCookie -delete 2>/dev/null || true
        find /config -type f -name DevToolsActivePort -delete 2>/dev/null || true
        exit 0
    restart: "no"

  browser:
    image: lscr.io/linuxserver/chromium:latest
    container_name: ander-browser
    depends_on:
      browser-clean:
        condition: service_completed_successfully
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Mexico_City}
      - TITLE=ANDER Browser
      - SUBFOLDER=/browser/
      - LC_ALL=es_MX.UTF-8
      - CHROME_CLI=--start-maximized --disable-features=Translate --disable-gpu --homepage=https://www.google.com
      - PIXELFLUX_WAYLAND=false
      - DISABLE_ZINK=true
      - DISABLE_DRI3=true
      - "SELKIES_USE_CPU=true|locked"
      - SELKIES_ENCODER=jpeg
      - SELKIES_FRAMERATE=30
      - SELKIES_MANUAL_WIDTH=1024
      - SELKIES_MANUAL_HEIGHT=768
      - MAX_RES=1024x768
      - SELKIES_FORCE_ALIGNED_RESOLUTION=true
      - SELKIES_SCALING_DPI=80
      - SELKIES_USE_CSS_SCALING=true
      - SELKIES_USE_BROWSER_CURSORS=true
      - SELKIES_UI_SIDEBAR_SHOW_TRACKPAD=true
      - SELKIES_UI_SIDEBAR_SHOW_KEYBOARD_BUTTON=true
      - SELKIES_UI_SIDEBAR_SHOW_SOFT_BUTTONS=true
      - SELKIES_UI_SHOW_SIDEBAR=false|locked
      - SELKIES_AUDIO_ENABLED=true
      - SELKIES_MICROPHONE_ENABLED=true
      - SELKIES_CLIPBOARD_ENABLED=true
      - SELKIES_FILE_TRANSFERS=upload,download
      - SELKIES_DEBUG=false
    volumes:
      - ./data/chromium:/config
      - ./data/workspace:/config/Downloads
    shm_size: "2gb"
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/browser/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 35s
    restart: unless-stopped

  code-settings:
    image: alpine:3.21
    volumes:
      - ./data/code-server:/config
      - ./code-server/settings.json:/defaults/settings.json:ro
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /config/data/User /config/data/Machine /config/data/User/globalStorage
        cp -f /defaults/settings.json /config/data/User/settings.json
        cp -f /defaults/settings.json /config/data/Machine/settings.json
        if [ -d /config/data/User/profiles ]; then
          find /config/data/User/profiles -mindepth 1 -maxdepth 1 -type d -exec cp -f /defaults/settings.json {}/settings.json \;
        fi
        if [ ! -f /config/.ander-normal-v3 ]; then
          find /config/data/User/workspaceStorage -mindepth 1 -delete 2>/dev/null || true
          find /config/data/User/globalStorage -maxdepth 1 -type f -name 'storage.json' -delete 2>/dev/null || true
          find /config/data/User/globalStorage -maxdepth 1 -type f -name 'state.vscdb*' -delete 2>/dev/null || true
          touch /config/.ander-normal-v3
        fi
        chmod -R a+rwX /config/data/User /config/data/Machine
    restart: "no"

  code:
    image: lscr.io/linuxserver/code-server:latest
    container_name: ander-code
    depends_on:
      code-settings:
        condition: service_completed_successfully
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Mexico_City}
      - SUDO_PASSWORD=${ANDER_PASSWORD:-cambia-esta-clave}
      - DEFAULT_WORKSPACE=/config/workspace
      - PWA_APPNAME=ANDER Code Ultra Compact
      - CS_DISABLE_GETTING_STARTED_OVERRIDE=1
    volumes:
      - ./data/code-server:/config
      - ./data/workspace:/config/workspace
    restart: unless-stopped

  powershell:
    image: ander-powershell:v5
    build:
      context: ./terminal
      args:
        OPENCODE_VERSION: "1.17.18"
    pull_policy: never
    container_name: ander-powershell
    environment:
      - TZ=${TZ:-America/Mexico_City}
      - HOME=/home/ander
      - OPENCODE_DISABLE_AUTOUPDATE=1
      - OPENCODE_DISABLE_PRUNE=1
      - OPENCODE_DISABLE_TERMINAL_TITLE=1
    volumes:
      - ./data/workspace:/workspace
      - ./data/opencode-share:/home/ander/.local/share/opencode
      - ./data/opencode-config:/home/ander/.config/opencode
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
